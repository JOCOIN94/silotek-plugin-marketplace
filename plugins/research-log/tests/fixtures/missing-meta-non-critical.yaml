title: "연구 일지"
subtitle: "연구 성격은 있지만 다른 권장 메타 키 누락"
meta:
  연구 주제: "테스트 주제"
  연구 성격: "구축"
  작성일: "2026년 5월 10일"
sections:
  - h1: "1. 검증"
  - p: "이 fixture는 연구 성격이 올바른 도메인 값으로 채워져 있으면 다른 권장 메타가 비어 있어도 schema validation을 통과해야 함을 확인한다. 연구 단계, 분류, 작성자는 일부러 비워 두었다. 저장기는 이 문서를 정상 저장해야 하며, Node 계층은 문장력이나 연구 품질을 판정하지 않는다."
  - h2: "시행착오"
  - p: "권장 메타와 필수 메타를 구분하지 않으면 사용자는 작성 흐름 중간에 불필요하게 차단된다. 이 fixture는 필수 도메인 값만 강제하고 나머지 정보는 작성자가 이후 보강할 수 있게 두는 정책을 검증한다."
  - h2: "향후 과제"
  - p: "남은 질문은 권장 메타 보강을 skill 문서에서 어떻게 자연스럽게 유도할지이다. Node 스크립트는 schema와 artifact 상태만 결정적으로 다룬다."
