title: "연구 일지"
subtitle: "이미지 파일 미존재 케이스"
meta:
  연구 주제: "테스트"
  연구 성격: "검증"
  연구 단계: "검증"
  분류: "테스트"
  작성일: "2026년 5월 10일"
  작성자: "테스터"
sections:
  - h1: "1. 검증"
  - p: "이 fixture는 image 요소에 지정된 파일 경로를 실제로 확인하는 deterministic artifact diagnostics를 검증하기 위해 작성되었다. 디스크에 해당 파일이 없으면 IMAGE_FILE_MISSING 경고가 발생해야 한다. 이 검사는 draftDir 옵션으로 전달된 기준 디렉터리에서 상대 경로를 해석한다."
  - p: "문서 품질 판정이 아니라 파일 존재성 확인만 다룬다. 테스트는 잘못된 경로가 보고서 생성 단계까지 통과하지 않도록 하는 경계 조건을 확인한다. 이 fixture에서 지정한 경로는 ./does-not-exist.png이며 실제로 존재하지 않는다."
  - image:
      path: "./does-not-exist.png"
      caption: "[그림 1] 존재하지 않는 파일"
  - table:
      headers: ["a", "b"]
      rows:
        - ["x", "y"]
  - h2: "시행착오"
  - p: "image 경로 검증 로직을 구현하는 과정에서 절대 경로와 상대 경로 처리 방식의 차이로 인해 초기 구현이 일부 케이스를 놓칠 수 있다. draftDir 옵션이 전달되지 않은 경우에는 경로 정보가 부족하므로 파일 존재성 판단을 생략한다."
  - h2: "향후"
  - p: "향후에는 원격 URL 경로나 절대 경로에 대한 추가 처리가 필요할 수 있다. 각 fixture가 특정 artifact condition을 명확히 격리하도록 관리하면 테스트 스위트의 신뢰성이 높아진다."
