title: "연구 일지"
subtitle: "메타 누락 케이스"
meta:
  연구 주제: "테스트 주제"
  작성일: "2026년 5월 10일"
sections:
  - h1: "1. 검증"
  - p: "이 fixture는 연구 성격이 빠진 문서를 schema 단계에서 거부하는지 확인하기 위해 작성되었다. 본문은 충분히 긴 설명을 포함하지만, 핵심 조건은 meta 블록에 연구 성격이 없다는 점이다. 저장기와 빌더는 이 값을 구축, 분석, 검증 중 하나로 요구하므로 이 문서는 실패해야 한다."
  - h2: "시행착오"
  - p: "과거 구현에서는 권장 메타 누락과 필수 도메인 누락을 같은 수준으로 다루기 쉬웠다. 현재 책임 경계에서는 연구 성격만 필수 도메인 값으로 다루고, 나머지 메타는 문서 작성자가 보강할 수 있는 일반 정보로 남긴다."
  - h2: "향후 과제"
  - p: "향후에는 이 fixture를 유지해 stale prompt나 오래된 명령 문서가 필수 연구 성격을 빠뜨릴 때 즉시 실패하는지 확인한다."
