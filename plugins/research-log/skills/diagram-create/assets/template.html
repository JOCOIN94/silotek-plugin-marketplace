<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silotek Diagram Template</title>
  <style>
    :root {
      --navy: #1e3a5f;
      --teal: #2c8d8a;
      --gray: #6b7280;
      --paper: #f8fafc;
      --ink: #0f172a;
      --line: #cbd5e1;
      --muted: #e5e7eb;
      --white: #ffffff;
    }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Pretendard, Arial, sans-serif;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    svg {
      width: min(100%, 1152px);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
      <title id="title">사일로텍 다이어그램 템플릿</title>
      <desc id="desc">요청, 판단, 산출을 좌에서 우로 연결하는 단일 Silotek light 다이어그램 템플릿</desc>
      <defs>
        <marker id="arrow-navy" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#1e3a5f"/>
        </marker>
        <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#2c8d8a"/>
        </marker>
      </defs>
      <rect width="960" height="540" fill="#f8fafc"/>
      <text x="72" y="72" font-family="Pretendard, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">다이어그램 제목</text>
      <text x="72" y="102" font-family="Pretendard, Arial, sans-serif" font-size="14" fill="#6b7280">claim과 evidence가 반드시 라벨 붙은 요소로 표현되어야 한다.</text>

      <rect x="88" y="196" width="176" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="392" y="176" width="176" height="128" rx="8" fill="#e8f5f5" stroke="#2c8d8a" stroke-width="2"/>
      <rect x="696" y="196" width="176" height="88" rx="8" fill="#ffffff" stroke="#1e3a5f" stroke-width="1.5"/>

      <path d="M264 240 H392" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrow-navy)"/>
      <path d="M568 240 H696" fill="none" stroke="#2c8d8a" stroke-width="2" marker-end="url(#arrow-teal)"/>

      <text x="176" y="232" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">요청</text>
      <text x="176" y="258" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#6b7280">사용자 의도</text>
      <text x="480" y="228" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a5f">판단</text>
      <text x="480" y="254" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#0f172a">근거 매핑</text>
      <text x="480" y="276" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#0f172a">가독성 점검</text>
      <text x="784" y="232" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">산출</text>
      <text x="784" y="258" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#6b7280">HTML + PNG</text>

      <text x="72" y="456" font-family="Pretendard, Arial, sans-serif" font-size="12" fill="#6b7280">Silotek light / self-contained / one inline SVG / no remote assets</text>
    </svg>
  </main>
</body>
</html>
