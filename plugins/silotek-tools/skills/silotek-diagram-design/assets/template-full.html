<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Silotek Editorial Diagram</title>
  <style>
    :root {
      --navy: #1e3a5f;
      --teal: #2c8d8a;
      --gray: #6b7280;
      --paper: #f8fafc;
      --ink: #0f172a;
      --line: #cbd5e1;
      --muted: #e5e7eb;
      --white: #ffffff;
    }
    html, body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Pretendard, Arial, sans-serif;
    }
    main {
      width: min(1180px, calc(100vw - 48px));
      margin: 40px auto;
    }
    .eyebrow {
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 8px 0 24px;
      font-size: 32px;
      line-height: 1.2;
    }
    svg {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Silotek Diagram</div>
    <h1>Editorial System View</h1>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
      <title id="title">Editorial System View</title>
      <desc id="desc">Replace this SVG body with the final diagram.</desc>
      <rect width="960" height="560" fill="#f8fafc"/>
      <rect x="64" y="120" width="832" height="312" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="480" y="276" fill="#1e3a5f" font-size="24" font-weight="700" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">Replace with inline SVG diagram</text>
    </svg>
  </main>
</body>
</html>
