# ============================================================
# 사일로텍 연구일지 템플릿 (v0.3.0)
# ============================================================
# 메타 권장 키 6개 + optional 자유 키 + 필수 섹션 8개 stub.
# 작성 후 save-draft.js로 저장하면 schema/path/asset diagnostics가 manifest에 기록됨.
# 연구 성격은 다음 셋 중 하나로 적는다: 구축 / 분석 / 검증.
# ============================================================

title: "연구 일지"
subtitle: "<이번 문서의 한 줄 주제>"

meta:
  연구 주제: "<예: RF카드 포렌식 앱 프로파일 용어 체계 정비>"
  연구 성격: "<구축 / 분석 / 검증 중 하나>"
  연구 단계: "<문제 정의 / 기술 검증 / 구현 / 회고 등>"
  분류: "<예: AI/ML, RAG / 보안 / 임베디드 등>"
  작성일: "2026년 5월 10일"
  작성자: "<이름>"
  # 아래는 모두 optional — 필요한 것만 적고 안 적어도 됨
  # 커밋버전: "abc1234"
  # 변경 규모: "+482 / -127 lines, 18 files"
  # 관련 프로젝트: "..."

sections:
  - h1: "1. 연구 질문"
  - p: "<이 문서가 답하려는 한 줄 질문>"

  - h1: "2. 문제 정의 / 배경"
  - p: "<무엇이 문제인가, 왜 지금 다루는가>"

  - h1: "3. 시도와 시행착오"
  - bullets:
      - "<시도 A — 결과>"
      - "<시도 B — 실패와 원인>"

  - h1: "4. 관찰 / 측정"
  - p: "<수치, 로그, 스크린샷이 있으면 image element로>"

  - h1: "5. 원인 분석"
  - p: "<관찰에서 가설로>"

  - h1: "6. 검증"
  - p: "<실험, 비교, 측정 결과로 가설 확인>"

  - h1: "7. 교훈 / 판단 기록"
  - bullets:
      - "<무엇을 알게 되었나>"
      - "<다음에 다르게 할 것>"

  - h1: "8. 향후 과제 / 남은 불확실성"
  - p: "<남은 질문>"
