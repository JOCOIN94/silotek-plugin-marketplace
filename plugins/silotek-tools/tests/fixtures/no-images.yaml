title: "연구 일지"
subtitle: "이미지 0 / 표 0 케이스"
meta:
  연구 주제: "테스트"
  연구 성격: "검증"
  연구 단계: "검증"
  분류: "테스트"
  작성일: "2026년 5월 10일"
  작성자: "테스터"
sections:
  - h1: "1. 검증"
  - p: "이 fixture는 image도 table도 없는 문서의 artifact stats를 확인한다. Node 계층은 이미지나 표가 없다는 이유로 연구 품질을 판정하지 않는다. 대신 stats.imageCount와 stats.tableCount가 0으로 계산되는지만 검증한다."
  - h2: "시행착오"
  - p: "이전 구조에서는 문서 구성 요소의 수를 연구 품질 판단과 섞어서 다루기 쉬웠다. 현재 구조에서는 schema, path, storage, asset 상태만 결정적으로 검사하고, 본문 보강이나 시각 자료 필요성 판단은 skill의 책임으로 둔다."
  - p: "따라서 이 fixture는 경고 문구를 기대하지 않는다. 테스트는 imageCount, tableCount, visualBriefCount가 정확히 산출되는지와 불필요한 writing-quality diagnostic이 나오지 않는지만 본다."
  - h2: "향후 과제"
  - p: "남은 질문은 skill 문서가 시각 자료 필요성을 얼마나 명확하게 판단하도록 유도할지이다. 파일 시스템 검증과 연구 판단을 분리하면 자동화가 예측 가능해지고, Claude-facing layer가 실제 연구 맥락을 더 잘 반영할 수 있다."
