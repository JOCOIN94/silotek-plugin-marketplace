<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>silotek-tools 아키텍처</title>
  <style>
    html, body { margin: 0; background: #f8fafc; color: #0f172a; font-family: Pretendard, Arial, sans-serif; }
    main { width: min(1120px, calc(100vw - 48px)); margin: 32px auto; }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <main>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" role="img" aria-labelledby="title desc">
      <title id="title">silotek-tools 아키텍처</title>
      <desc id="desc">Claude-facing 층이 판단하고, Node 층은 진단만 하며, 데이터는 플러그인 밖 중앙 저장소에 쌓인다.</desc>
      <rect width="960" height="660" fill="#f8fafc"/>

      <text x="48" y="56" fill="#0f172a" font-size="26" font-weight="700">silotek-tools 아키텍처</text>
      <text x="48" y="82" fill="#6b7280" font-size="14">Claude-facing 층 = 판단 · Node 층 = 스키마/경로/자산 진단 · 데이터 = 플러그인 밖 중앙 저장소</text>

      <defs>
        <marker id="arrow-navy" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#1e3a5f"/></marker>
        <marker id="arrow-teal" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#2c8d8a"/></marker>
        <marker id="arrow-gray" markerWidth="9" markerHeight="9" refX="7.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#6b7280"/></marker>
      </defs>

      <!-- 연결선 (박스 뒤) -->
      <path d="M480 250 V296" fill="none" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow-navy)"/>
      <path d="M480 472 V518" fill="none" stroke="#2c8d8a" stroke-width="2.5" marker-end="url(#arrow-teal)"/>

      <!-- ===== 층 1: Claude-facing ===== -->
      <rect x="48" y="104" width="864" height="146" rx="10" fill="#ffffff" stroke="#1e3a5f" stroke-width="2.5"/>
      <rect x="68" y="96" width="220" height="22" fill="#f8fafc"/>
      <text x="72" y="113" fill="#1e3a5f" font-size="15" font-weight="700">Claude-facing 층 — 판단을 한다</text>

      <rect x="72" y="134" width="256" height="96" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="200" y="160" fill="#0f172a" font-size="15" font-weight="700" text-anchor="middle">commands/*.md</text>
      <text x="200" y="182" fill="#6b7280" font-size="12.5" text-anchor="middle">슬래시 명령 5개</text>
      <text x="200" y="200" fill="#6b7280" font-size="11.5" text-anchor="middle">setup-check · yaml-create</text>
      <text x="200" y="216" fill="#6b7280" font-size="11.5" text-anchor="middle">yaml-retouch · docx-create · diagram-create</text>

      <rect x="352" y="134" width="256" height="96" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="480" y="160" fill="#0f172a" font-size="15" font-weight="700" text-anchor="middle">skills/* (4개)</text>
      <text x="480" y="182" fill="#6b7280" font-size="11.5" text-anchor="middle">yaml-create · yaml-retouch</text>
      <text x="480" y="198" fill="#6b7280" font-size="11.5" text-anchor="middle">docx-create · diagram-design</text>
      <text x="480" y="218" fill="#1e3a5f" font-size="11.5" text-anchor="middle">"연구 인자가 충분한가" 판단</text>

      <rect x="632" y="134" width="256" height="96" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="760" y="160" fill="#0f172a" font-size="15" font-weight="700" text-anchor="middle">agents/</text>
      <text x="760" y="182" fill="#0f172a" font-size="13.5" text-anchor="middle">silotek-diagrammer.md</text>
      <text x="760" y="204" fill="#6b7280" font-size="11.5" text-anchor="middle">visual_brief당 1 인스턴스</text>
      <text x="760" y="220" fill="#6b7280" font-size="11.5" text-anchor="middle">병렬 디스패치</text>

      <!-- ===== 층 2: Node ===== -->
      <rect x="48" y="296" width="864" height="176" rx="10" fill="#ffffff" stroke="#2c8d8a" stroke-width="2.5"/>
      <rect x="68" y="288" width="280" height="22" fill="#f8fafc"/>
      <text x="72" y="305" fill="#2c8d8a" font-size="15" font-weight="700">Node 층 — 스키마·경로·자산 진단만</text>

      <rect x="72" y="326" width="408" height="64" rx="8" fill="#ffffff" stroke="#1e3a5f" stroke-width="2"/>
      <text x="276" y="350" fill="#1e3a5f" font-size="15" font-weight="700" text-anchor="middle">common.js</text>
      <text x="276" y="372" fill="#6b7280" font-size="12" text-anchor="middle">스키마 검증 · 저장 경로 · 결정적 진단 · 이미지 경로 재작성</text>

      <rect x="496" y="326" width="392" height="64" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="692" y="350" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">build.js — DOCX 렌더러</text>
      <text x="692" y="372" fill="#6b7280" font-size="12" text-anchor="middle">build-docx.js · save-draft.js</text>

      <rect x="72" y="402" width="816" height="50" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="480" y="424" fill="#0f172a" font-size="13.5" font-weight="700" text-anchor="middle">유틸: next-diagram-path.js · rasterize-svg.js · resolve-yaml.js · setup-check.js</text>
      <text x="480" y="442" fill="#6b7280" font-size="11.5" text-anchor="middle">원칙: 연구 로그를 재작성하지 않고, 연구 인자 강도를 판단하지 않는다</text>

      <!-- ===== 층 3: 중앙 저장소 ===== -->
      <rect x="48" y="518" width="864" height="118" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
      <rect x="68" y="510" width="360" height="22" fill="#f8fafc"/>
      <text x="72" y="527" fill="#6b7280" font-size="15" font-weight="700">중앙 저장소 — 플러그인 밖 (로컬 파일 시스템)</text>

      <rect x="72" y="544" width="500" height="80" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="322" y="568" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">Documents/Silotek Research Logs/</text>
      <text x="322" y="592" fill="#6b7280" font-size="12.5" text-anchor="middle">inputs/ · outputs/ · manifests/ · figures/</text>
      <text x="322" y="612" fill="#6b7280" font-size="11.5" text-anchor="middle">DOCX는 PNG만 소비</text>

      <rect x="588" y="544" width="300" height="80" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="738" y="568" fill="#0f172a" font-size="13.5" font-weight="700" text-anchor="middle">.silotek-research-log-figures/</text>
      <text x="738" y="590" fill="#6b7280" font-size="12" text-anchor="middle">diagram-N.{html, png}</text>
      <text x="738" y="610" fill="#6b7280" font-size="11.5" text-anchor="middle">HTML 사이드카 = 편집·미리보기용</text>

      <!-- 연결선 라벨 -->
      <rect x="492" y="262" width="170" height="20" fill="#f8fafc"/>
      <text x="498" y="277" fill="#1e3a5f" font-size="12">스킬이 Node 스크립트 호출</text>
      <rect x="492" y="484" width="170" height="20" fill="#f8fafc"/>
      <text x="498" y="499" fill="#2c8d8a" font-size="12">검증·저장·래스터 결과</text>
    </svg>
  </main>
</body>
</html>
