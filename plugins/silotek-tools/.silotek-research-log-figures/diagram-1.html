<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>silotek-tools 버전별 구축 타임라인</title>
  <style>
    :root {
      --navy: #1e3a5f;
      --teal: #2c8d8a;
      --gray: #6b7280;
      --paper: #f8fafc;
      --ink: #0f172a;
      --line: #cbd5e1;
      --muted: #e5e7eb;
      --white: #ffffff;
    }
    html, body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Pretendard, Arial, sans-serif;
    }
    main {
      width: min(1120px, calc(100vw - 48px));
      margin: 32px auto;
    }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <main>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
      <title id="title">silotek-tools 버전별 구축 타임라인</title>
      <desc id="desc">v0.1.x부터 v0.4.0까지 다섯 단계에 걸쳐 silotek-tools가 단계적으로 더한 기능을 시간 순서로 보여주는 타임라인. 각 버전은 직전 버전의 시행착오를 메우며 쌓였다.</desc>
      <rect width="1120" height="620" fill="#f8fafc"/>

      <!-- 제목 -->
      <text x="48" y="58" fill="#0f172a" font-size="26" font-weight="700" font-family="Pretendard, Arial, sans-serif">silotek-tools 버전별 구축 타임라인</text>
      <text x="48" y="86" fill="#6b7280" font-size="15" font-family="Pretendard, Arial, sans-serif">각 버전은 직전 버전의 시행착오를 메우며 쌓였다 — 순서대로 누적</text>

      <!-- 베이스라인 -->
      <path d="M88 300 H1064" fill="none" stroke="#cbd5e1" stroke-width="1"/>
      <path d="M1064 300 l-10 -5 v10 z" fill="#cbd5e1"/>

      <!-- 틱 위치: 5개, 등간격 (순서축, 날짜 아님) -->
      <!-- x: 168, 392, 616, 808, 984 -->

      <!-- 1) v0.1.x  (위) -->
      <line x1="168" y1="300" x2="168" y2="170" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="168" cy="300" r="4" fill="#6b7280"/>
      <rect x="80" y="100" width="232" height="74" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="96" y="124" fill="#1e3a5f" font-size="15" font-weight="700" font-family="Pretendard, Arial, sans-serif">v0.1.x · 스키마 강제</text>
      <text x="96" y="144" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">YAML 스키마 강제, 금지 top-level</text>
      <text x="96" y="160" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">키 거부, 깨끗한 레이아웃</text>
      <text x="168" y="328" fill="#6b7280" font-size="12.5" font-weight="700" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">v0.1.x</text>

      <!-- 2) v0.1.3 (아래) -->
      <line x1="392" y1="300" x2="392" y2="430" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="392" cy="300" r="4" fill="#6b7280"/>
      <rect x="304" y="430" width="232" height="74" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="320" y="454" fill="#1e3a5f" font-size="15" font-weight="700" font-family="Pretendard, Arial, sans-serif">v0.1.3 · 연구 아크</text>
      <text x="320" y="474" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">8섹션 연구 아크 템플릿 +</text>
      <text x="320" y="490" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">analyzeQuality 경고 + node:test</text>
      <text x="392" y="280" fill="#6b7280" font-size="12.5" font-weight="700" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">v0.1.3</text>

      <!-- 3) v0.2.0 (위) -->
      <line x1="616" y1="300" x2="616" y2="170" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="616" cy="300" r="4" fill="#6b7280"/>
      <rect x="528" y="100" width="232" height="74" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="544" y="124" fill="#1e3a5f" font-size="15" font-weight="700" font-family="Pretendard, Arial, sans-serif">v0.2.0 · 연구 성격 + brief</text>
      <text x="544" y="144" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">연구 성격(구축·분석·검증) 강제,</text>
      <text x="544" y="160" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">visual_brief, diagrammer·critic</text>
      <text x="616" y="328" fill="#6b7280" font-size="12.5" font-weight="700" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">v0.2.0</text>

      <!-- 4) v0.3.0~0.3.1 (아래) -->
      <line x1="808" y1="300" x2="808" y2="430" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="808" cy="300" r="4" fill="#6b7280"/>
      <rect x="720" y="430" width="232" height="74" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
      <text x="736" y="454" fill="#1e3a5f" font-size="15" font-weight="700" font-family="Pretendard, Arial, sans-serif">v0.3.0–0.3.1 · 리네임</text>
      <text x="736" y="474" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">silotek-research-log →</text>
      <text x="736" y="490" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">silotek-tools, plugin-root 해석 수정</text>
      <text x="808" y="280" fill="#6b7280" font-size="12.5" font-weight="700" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">v0.3.x</text>

      <!-- 5) v0.4.0 (위, 강조) -->
      <line x1="984" y1="300" x2="984" y2="170" stroke="#2c8d8a" stroke-width="1.5"/>
      <circle cx="984" cy="300" r="6" fill="#2c8d8a"/>
      <rect x="888" y="96" width="200" height="82" rx="8" fill="#ffffff" stroke="#2c8d8a" stroke-width="2"/>
      <text x="904" y="120" fill="#1e3a5f" font-size="15" font-weight="700" font-family="Pretendard, Arial, sans-serif">v0.4.0 · 병렬 다이어그램</text>
      <text x="904" y="140" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">source/nature 선택 복원,</text>
      <text x="904" y="156" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">next-diagram-path --count,</text>
      <text x="904" y="172" fill="#0f172a" font-size="12.5" font-family="Pretendard, Arial, sans-serif">diagrammer per-brief 병렬</text>
      <text x="984" y="328" fill="#2c8d8a" font-size="12.5" font-weight="700" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">v0.4.0</text>

      <!-- 누적 화살표 라벨 -->
      <text x="576" y="546" fill="#6b7280" font-size="12.5" text-anchor="middle" font-family="Pretendard, Arial, sans-serif">스키마 강제 → 8섹션 아크 + 품질 경고 → 연구 성격 + visual_brief + 서브에이전트 → 패키지 리네임 → 병렬 다이어그램</text>

      <!-- 캡션 -->
      <text x="48" y="600" fill="#0f172a" font-size="13.5" font-family="Pretendard, Arial, sans-serif">[그림 1] silotek-tools 버전별 구축 타임라인 (v0.1.x → v0.4.0)</text>
    </svg>
  </main>
</body>
</html>
