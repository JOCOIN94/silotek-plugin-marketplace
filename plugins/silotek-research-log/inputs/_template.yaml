# ============================================================
# 사일로텍 연구일지 템플릿
# ============================================================
# 이 파일을 복사해서 새 연구일지를 작성하세요.
# 파일명 규칙: YYYY-MM-DD-주제.yaml (예: 2026-04-19-rag-test.yaml)
# 
# 사용법:
#   1. 이 파일을 inputs/ 폴더에 복사하고 이름 변경
#   2. 내용 수정
#   3. node build.js inputs/your-file.yaml 실행
#   4. outputs/your-file.docx 확인
# ============================================================

title: "연구 일지"
subtitle: "여기에 부제를 입력하세요"

# 상단 메타 정보 테이블
meta:
  연구 주제: "연구 주제 한 줄 요약"
  작성일: "2026년 4월 19일"
  작성자: "홍길동"
  연구 단계: "기술 검증 (Technical Feasibility Study)"
  분류: "AI/ML, RAG"

# 로고 경로 (기본값 사용 시 생략 가능)
# logo: ../figures/logo_silotek.png

# ============================================================
# 본문 섹션
# 
# 사용 가능한 요소 타입:
#   - h1: 큰 제목 (예: "1. 배경")
#   - h2: 중간 제목 (예: "1.1 목적")  
#   - h3: 작은 제목
#   - p: 일반 문단 (문자열로 바로 써도 됨)
#   - bullets: 불릿 리스트
#   - numbers: 번호 리스트
#   - code: 코드 블록 (고정폭 글꼴)
#   - image: 이미지 삽입 + 캡션
#   - table: 표 삽입
#   - note: 강조 박스 (노란 배경)
#   - spacer: 빈 줄
#
# 인라인 서식:
#   **굵게** 처럼 쓰면 굵은 글씨로 나옵니다.
# ============================================================
sections:
  
  # ── 1장 ──────────────────────────────────────
  - h1: "1. 배경 및 목적"
  
  - h2: "1.1 배경"
  - p: "여기에 연구 배경을 설명합니다. **핵심 키워드**는 강조할 수 있습니다."
  
  - h2: "1.2 목적"
  - bullets:
      - "목적 첫 번째"
      - "목적 두 번째"
      - "목적 세 번째"
  
  # ── 2장 ──────────────────────────────────────
  - h1: "2. 방법"
  
  - h2: "2.1 실험 설계"
  - p: "실험 방법을 상세히 기술합니다."
  
  # 이미지 삽입
  - image:
      path: "../figures/예시이미지.png"
      caption: "[그림1] 실험 설정 다이어그램"
      width: 6.0   # 인치 단위 (기본 6.0)
  
  - h2: "2.2 기술 스택"
  
  # 테이블 삽입
  - table:
      headers: ["레이어", "선택 기술", "역할"]
      columnWidths: [2260, 3383, 3383]   # 선택사항 (DXA 단위, 합계 9026)
      rows:
        - ["오케스트레이션", "n8n", "워크플로우 엔진"]
        - ["벡터 DB", "Qdrant", "의미 검색"]
        - ["LLM", "Ollama", "로컬 추론"]
  
  # ── 3장 ──────────────────────────────────────
  - h1: "3. 결과"
  
  - h2: "3.1 주요 발견"
  - numbers:
      - "첫 번째 발견 사항"
      - "두 번째 발견 사항"
      - "세 번째 발견 사항"
  
  # 코드 블록
  - code: |
      # 예시 코드
      def hello():
          print("world")
  
  # 강조 박스
  - note: "**중요:** 이 부분은 특별히 주의할 사항입니다."
  
  # ── 4장 ──────────────────────────────────────
  - h1: "4. 결론"
  
  - p: "연구 결론을 요약합니다."
  
  - h2: "4.1 한계 및 향후 과제"
  - bullets:
      - "향후 과제 1"
      - "향후 과제 2"
