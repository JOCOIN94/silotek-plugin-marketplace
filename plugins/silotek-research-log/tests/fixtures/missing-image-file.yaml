title: "연구 일지"
subtitle: "이미지 파일 미존재 케이스"
meta:
  연구 주제: "테스트"
  연구 단계: "검증"
  분류: "테스트"
  작성일: "2026년 5월 10일"
  작성자: "테스터"
sections:
  - h1: "1. 검증"
  - p: "이 픽스처는 IMAGE_FILE_MISSING 경고를 단독으로 검증하기 위해 작성되었다. 사일로텍 연구일지 품질 분석기는 image 요소에 지정된 파일 경로를 실제로 확인하며, 디스크에 해당 파일이 없을 경우 IMAGE_FILE_MISSING 경고를 발생시킨다. 이 검사는 draftDir 옵션으로 전달된 기준 디렉터리에서 상대 경로를 해석한다."
  - p: "TEXT_TOO_SHORT 경고가 함께 발생하지 않도록 본문을 충분히 작성해야 한다. 품질 분석기의 기준치는 800자이며, 이 픽스처는 1000자 이상을 목표로 한다. 픽스처가 단 하나의 경고만 발생시키도록 제어함으로써, 테스트가 특정 시그널을 정확하게 격리할 수 있다. 이는 향후 분석 로직 변경 시에도 테스트 의도가 명확히 유지되도록 보장하는 역할을 한다."
  - p: "이미지 파일 경로 검증은 draft 저장 단계에서도 수행되지만, 품질 분석기는 런타임에 독립적으로 같은 검사를 수행한다. 두 단계에서 각각 검증함으로써 잘못된 경로가 보고서 생성 단계까지 통과하는 것을 방지한다. 이 픽스처에서 지정한 경로는 ./does-not-exist.png이며 실제로 존재하지 않는다. 분석기가 이 경로를 확인할 때 fs.existsSync를 사용하며, 파일이 없으면 IMAGE_FILE_MISSING 경고 객체를 반환한다."
  - image:
      path: "./does-not-exist.png"
      caption: "[그림 1] 존재하지 않는 파일"
  - table:
      headers: ["a", "b"]
      rows:
        - ["x", "y"]
  - h2: "시행착오"
  - p: "image 경로 검증 로직을 구현하는 과정에서 절대 경로와 상대 경로 처리 방식의 차이로 인해 초기 구현이 일부 케이스를 놓쳤다. draftDir 옵션이 전달되지 않은 경우에는 경고를 생략하도록 설계하여, 경로 정보 없이 호출될 때는 IMAGE_FILE_MISSING이 발생하지 않는다. 이러한 설계 결정은 analyzeQuality가 초안 저장 없이 호출되는 환경에서도 안전하게 동작하도록 보장하기 위한 것이다."
  - h2: "향후"
  - p: "향후에는 원격 URL 경로나 절대 경로에 대한 추가 처리가 필요할 수 있다. 또한 픽스처 관리 가이드라인에 textLength 기준을 명시하여 의도치 않은 TEXT_TOO_SHORT 동반 발생을 예방하는 것을 고려해야 한다. 각 픽스처가 정확히 하나의 경고 시그널만 격리하도록 관리하면 테스트 스위트의 신뢰성이 높아진다."
