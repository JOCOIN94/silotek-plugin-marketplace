title: "연구 일지"
subtitle: "이미지 0 / 표 0 케이스"
meta:
  연구 주제: "테스트"
  연구 단계: "검증"
  분류: "테스트"
  작성일: "2026년 5월 10일"
  작성자: "테스터"
sections:
  - h1: "1. 검증"
  - p: "이 fixture는 image도 table도 없다. NO_IMAGES와 NO_TABLES warn이 모두 떠야 한다. 본문은 800자 이상이라 TEXT_TOO_SHORT는 뜨지 않는다. 검증 헤딩이 있으니 NO_VALIDATION_SECTION도 안 뜬다. 시행착오와 향후도 헤딩에 적어 키워드 warn을 피한다."
  - h2: "시행착오"
  - p: "시도와 실패 — 본문 길이를 800자 이상으로 채우기 위한 추가 텍스트. 사일로텍 연구일지의 표준 흐름을 따른다. 충분한 길이를 확보하기 위해 같은 정도의 문단을 한 번 더 쓴다. 시도와 실패 — 본문 길이를 800자 이상으로 채우기 위한 추가 텍스트. 사일로텍 연구일지의 표준 흐름을 따른다. 충분한 길이를 확보하기 위해 같은 정도의 문단을 한 번 더 쓴다."
  - p: "연구일지 작성 규격은 품질 분석 함수가 경고를 발생시키는 조건을 명확히 정의한다. 본문 텍스트의 총 길이가 800자 미만이면 TEXT_TOO_SHORT 경고가 발생하고, 이미지 요소가 하나도 없으면 NO_IMAGES 경고가, 표 요소가 하나도 없으면 NO_TABLES 경고가 발생한다. 이 픽스처는 이미지와 표를 의도적으로 제거하여 두 경고가 동시에 발생하는 상황을 격리 검증하기 위해 작성되었다. 따라서 본문 길이는 충분히 확보하여 TEXT_TOO_SHORT 경고가 혼입되지 않도록 해야 한다."
  - p: "사일로텍 연구일지 플러그인의 품질 분석 모듈은 문서 구조와 내용을 검사하여 작성자에게 보완이 필요한 영역을 안내한다. 품질 경고는 에러와 달리 저장을 막지 않으며, 작성자가 스스로 판단하여 보완 여부를 결정할 수 있도록 정보성 메시지로 제공된다. 픽스처 파일은 각 경고 조건을 독립적으로 재현해야 하며, 여러 경고가 동시에 발생하는 픽스처는 테스트의 의도를 흐릴 수 있으므로 주의가 필요하다. 이 원칙에 따라 no-images.yaml 픽스처는 이미지·표 부재 조건만 격리하고 다른 경고 조건은 모두 만족시킨다."
  - h2: "향후 과제"
  - p: "남은 질문. 이미지와 표를 포함하는 완전한 픽스처를 별도로 작성하여 모든 품질 경고가 발생하지 않는 기준 케이스를 확립할 필요가 있다. 또한 경계값인 800자 근처에서 경고 발생 여부가 정확히 전환되는지를 확인하는 픽스처도 추가 검토 대상이다. 장기적으로는 텍스트 길이 임계값을 설정 파일로 외부화하여 프로젝트별 기준을 유연하게 적용할 수 있도록 개선하는 방향을 고려한다."
