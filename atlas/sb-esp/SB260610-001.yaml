device: SB-ESP
fw_version: SB260610-001
source_ref: "https://github.com/stek747/SB-SmartBay.git@0b017619aed175ae7fdd72af5142f7f6993902c2"
version_skew: null
states:
  runtime-serial:
    entry: "Normal loop UART0 serial input after setup when AP mode is not active."
    desc: "Serial characters are buffered into msg; backspace edits, tab echoes, < and > recall command history, and enter executes when msg.length() > 2."
  apmode-serial:
    entry: "Serial input inside the AP-mode setup loop."
    desc: "AP-mode serial input shares the AP/telnet command parser, including short HELP and MHELP, then dispatches other messages to serialCmd()."
  runtime-telnet:
    entry: "Telnet client connected to the AP-mode telnet server."
    desc: "Telnet input is echoed, newline sets fendMsg, and the AP-mode parser dispatches the received string to HELP/MHELP handling or serialCmd()."
  boot_menu:
    entry: "Reset-time setup window after SPIFFS mount, before normal runtime."
    desc: "The menu starts with tmpcnt=1000, any received key refreshes tmpcnt to 5000, D/S/B/R are handled directly, and any other key only extends the window."
commands:
  - name: HELP
    context: runtime-serial
    syntax: "HELP"
    prompts: []
    description: "Prints the normal runtime serial command list."
    effect: "Prints RESET, GID, UNITID, SETCONFIG, SETBAYCONFIG, REGMAC, SETREGMAC, MAC, VRSSI, FWVER, CHANNEL, COIN, APMODE, SHOWPROC, REMFILE, FORMAT, WFORMAT, VFILELST, VFILE, DOWNBIN, REFLASHSTM, REFLASHESP, STWIFI, SETWIFI, VEXTUNITINFO, SETRTCTIME, VRTC, ALIVE, VREVBUFF, CHKMEM, CMPMEM, SETCARDINFO, PRINTSENDPROC, VSAVEEVENTCNT."
    risk: R0
    risk_reason: "Print-only parser branch."
    source_ref: "sb-esp32/SB_ESP32.ino:16578"
    observed: null
  - name: "???"
    context: runtime-serial
    syntax: "???"
    prompts: []
    description: "Alias for normal runtime serial HELP."
    effect: "Prints the same normal runtime serial command list as HELP."
    risk: R0
    risk_reason: "Print-only parser branch."
