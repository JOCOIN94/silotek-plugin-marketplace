version_skew: "장비 SB1 STM 배포 빌드 v2.19 (소스 HEAD v2.34) — 2026-06-12 실측에서 HELP 9개 목록은 HEAD와 동일함을 확인"
states:
  runtime-serial:
    entry: "STM32 UART0 command loop inside main()."
    desc: "Characters are echoed into buf until enter; blank enter resets the MCU, backspace removes one buffered byte, unknown commands print Unknown command, and the buffer is cleared when Wrbufcnt reaches 49."
  inter-mcu-uart1:
    entry: "ESP->STM binary command channel on USART1, sharing the same Rx1 ring buffer as the runtime-serial CLI (HAL_UART_RxCpltCallback main.c:3170-3178). The SB-STM debug header (e.g. COM12) writes onto this same line, so console writes and ESP commands compete on one bus."
    desc: "ChkPacket() (main.c:7856) scans Rx1 once >=3 bytes are buffered: 0xFF ping (echo 0xFF), 0xFA,0xFA long frame ([FA FA][CMD][LenH][LenL][Data..][sum][FB], sum=CMD+Len+Data), 0x02 STX camera frame, or 3-byte [CMD,VAL,0xFB] (no checksum). Command_Proc() (main.c:8607) dispatches CMD; follow-up payload bytes are read by RecieveData() (main.c:8368, 200ms/byte, big-endian). Responses return on the same channel via ok_return [CMD,VAL,0xFB] / unknown_return [E2,00,FB] / fail_return [FF,FF,FF] (main.c:7760-7806). Full analysis in notes-injection-vector.md."
