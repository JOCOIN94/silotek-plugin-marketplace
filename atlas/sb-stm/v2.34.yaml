  # --- Inter-MCU UART1 binary command channel (ESP->STM). Frame [CMD][VAL][0xFB][+payload]; payload big-endian via RecieveData(). See notes-injection-vector.md. ---
  - name: "0x60 (System hold/run/update)"
    context: inter-mcu-uart1
    syntax: "60 [VAL] FB  (VAL 0=Hold, 2=Run, 3=Update)"
    prompts: []
    description: "ESP commands the STM operating state."
    effect: "holdProc(); VAL=0 sets fHold and DISP_UNIT_HALT, VAL=2 clears fHold to NOTUSED, VAL=3 sets fHold + DISP_UPDATE; cancels online card control. ok_return."
    risk: R1
    risk_reason: "Changes run/hold state; reversible."
    source_ref: "smartBay/Core/Src/main.c:8657"
    observed: null
  - name: "0x60 VAL=1 (Reset)"
    context: inter-mcu-uart1
    syntax: "60 01 FB"
    prompts: []
    description: "ESP commands an STM reboot."
    effect: "Send_Alive(256), HAL_Delay(100), NVIC_SystemReset()."
    risk: R2
    risk_reason: "Reboots the STM32."
    source_ref: "smartBay/Core/Src/main.c:8688"
    observed: null
