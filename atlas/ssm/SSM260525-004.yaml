device: SSM
fw_version: SSM260525-004
source_ref: "https://github.com/stek747/ssm-esp32.git@178e29f7e94ab4ba2b1e1e2059e097bb377a2b98"
version_skew: "Source HEAD reports SSM260525-004; deployed device version is unverified and must be checked by later hardware observation."
states:
  runtime-serial:
    entry: "Main FreeRTOS task serial parser after setup."
    desc: "main_repeat() buffers UART0 input, prints runtime HELP/HHELP/THELP at the runtime parser site, and dispatches other strings to serialCmd()."
  apmode-serial-telnet:
    entry: "AP-mode debug parser with telnet side effects."
    desc: "AP-mode parser accepts UART/telnet input, prints short HELP, MHELP, HHELP, and THELP, then dispatches other strings to serialCmd()."
  socketio-web:
    entry: "Socket.IO/Web command path."
    desc: "Web JSON is queued into the web command buffer and later decoded by operationType."
  espnow-master:
    entry: "ESP-NOW master path."
    desc: "SSM sends JSON or binary packets to SB, APU, APU_C, Repeater, and related lower devices with sendMessage()."
  ota-update:
    entry: "OTA/download/reflash lifecycle."
    desc: "TargetsPreparedForUpdate, DownloadedFile, fReflash, and Updatestep drive SSM and lower-device firmware update flow."
  inspect-mode:
    entry: "Communication inspection mode."
    desc: "REQSTCOMM enables request/response inspection counters while blocking if inspect, comm-fault check, or OTA is active."
  boot-menu:
    entry: "Reset-time setup window before normal runtime."
    desc: "After setup enters the menu loop, tmpcnt starts at 1000 and any received key refreshes tmpcnt to 5000; D/S/B/I/R are handled directly and other keys extend the window."
